<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wise Gun - Reliable Companion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --dark-bg: #262626;
            --darker-bg: #1a1a1a;
            --accent-gold: #c89f3e; 
            --light-text: #e0e0e0;
        }

        body {
            background-color: var(--darker-bg);
            color: var(--light-text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        
        .custom-header {
            background-color: var(--dark-bg);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { color: var(--accent-gold); text-decoration: none; font-weight: bold; letter-spacing: 2px; }
        .custom-nav a { color: var(--light-text); text-decoration: none; margin: 0 15px; font-size: 0.9rem; }
        .custom-nav a.active { color: var(--accent-gold); }


        .slider-container {
            position: relative;
            width: 100%;
            height: 65vh;
            overflow: hidden;
            border-radius: 15px;
            margin-top: 1rem;
        }

        .slider-track {
            display: flex;
            width: 300%; 
            height: 100%;
            animation: slide-animation 15s infinite ease-in-out;
        }

        .slide {
            width: 33.333%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        
        .slide-1 { background-image: url('https://images.unsplash.com/photo-1595232063300-366f076191c9?auto=format&fit=crop&w=1200'); }
        .slide-2 { background-image: url('https://images.unsplash.com/photo-1584285418504-0051b6d61081?auto=format&fit=crop&w=1200'); }
        .slide-3 { background-image: url('https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=1200'); }

        .slide-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        @keyframes slide-animation {
            0%, 20% { transform: translateX(0); }
            33%, 53% { transform: translateX(-33.333%); }
            66%, 86% { transform: translateX(-66.666%); }
            100% { transform: translateX(0); }
        }

        .dots-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--light-text);
            opacity: 0.4;
        }

        /
        .custom-footer {
            background-color: var(--dark-bg);
            padding: 2rem 0;
            text-align: center;
            margin-top: 4rem;
        }
    </style>
</head>

<body>

    <header class="custom-header">
        <a href="index.html" class="logo">WISE GUN</a>
        <nav class="custom-nav d-none d-md-block">
            <a href="index.html" class="active">Home</a>
            <a href="Wisegun2.html">About & Explore</a>
            <a href="Wisegun3.html">Rules</a>
        </nav>
        <div style="display:flex; align-items:center; gap:15px;">
            <i data-lucide="search" style="color:var(--accent-gold)"></i>
            <i data-lucide="menu" style="color:var(--accent-gold)"></i>
        </div>
    </header>

    <main class="container">
        <div class="row">
            <div class="col-12">
                <div class="slider-container shadow-lg">
                    <div class="slider-track">
                        <div class="slide slide-1">
                            <div class="slide-overlay">
                                <div>
                                    <h1 style="color:var(--accent-gold); font-size: 3.5rem; margin:0;">WISE GUN</h1>
                                    <p style="font-style:italic; font-size:1.2rem;">a reliable companion for guiding in buying and registering a gun.</p>
                                </div>
                            </div>
                        </div>
                        <div class="slide slide-2">
                            <div class="slide-overlay">
                                <div>
                                    <h2 style="color:var(--accent-gold); font-size: 3rem; margin:0;">Safety First</h2>
                                    <p style="font-size:1.2rem;">Learn essential practices for safe handling.</p>
                                </div>
                            </div>
                        </div>
                        <div class="slide slide-3">
                            <div class="slide-overlay">
                                <div>
                                    <h2 style="color:var(--accent-gold); font-size: 3rem; margin:0;">Registration</h2>
                                    <p style="font-size:1.2rem;">Official PNP FEO guidance and steps.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="dots-container">
                        <div class="dot" style="background:var(--accent-gold); opacity:1;"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="custom-footer">
        <p style="font-size:0.8rem; opacity:0.5;">© WISE GUN 2026 | Promoting Safe and Legal Firearm Ownership.</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
    </html>
